backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "articles"
    label: "Articles"
    folder: "content/articles"
    create: true
    slug: "{{title | slugify}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Excerpt", name: "excerpt", widget: "text" }
      - { label: "Category", name: "category", widget: "select", options: ["ai", "webdev", "tech"] }
      - { label: "Category Display", name: "categoryDisplay", widget: "string" }
      - { label: "Category Color", name: "categoryColor", widget: "string" }
      - { label: "Read Time", name: "readTime", widget: "string" }
      - { label: "Date", name: "date", widget: "string" }
      - { label: "Author", name: "author", widget: "string" }
      - { label: "Author Initial", name: "authorInitial", widget: "string" }
      - { label: "Views", name: "views", widget: "string" }
      - { label: "Icon", name: "icon", widget: "string" }
      - { label: "Gradient", name: "gradient", widget: "string" }
      - { label: "Featured", name: "featured", widget: "boolean" }

  - name: "ai-tools"
    label: "AI Tools"
    folder: "content/ai-tools"
    create: true
    slug: "{{name | slugify}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Rating", name: "rating", widget: "number" }
      - { label: "Stars", name: "stars", widget: "number" }
      - { label: "Pricing", name: "pricing", widget: "string" }
      - { label: "Pricing Color", name: "pricingColor", widget: "string" }
      - { label: "Icon", name: "icon", widget: "string" }
      - { label: "Gradient", name: "gradient", widget: "string" }